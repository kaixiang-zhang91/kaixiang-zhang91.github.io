  {% if post.type %}
    <p><strong>{{ post.type }}</strong></p>
  {% endif %}

  {% if post.venue %}
    <p>{{ post.venue }}</p>
  {% endif %}

  {% if post.semesters %}
  <p>
    <strong>Semesters taught:</strong>
    {{ post.semesters | join: ", " }}
  </p>
{% endif %}

  {% if post.excerpt %}
    <p>{{ post.excerpt }}</p>
  {% endif %}
</div>
