<div class="teaching-entry">
  <h2 class="archive__item-title">
    {% if post.permalink %}
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    {% else %}
      {{ post.title }}
    {% endif %}
  </h2>

  {% if post.type %}
    <p>{{ post.type }}, <i>{{ post.venue }}</i> </p>
  {% endif %}

  {% if post.semesters %}
    <p>Semesters taught:
    {{ post.semesters | join: ", " }}
    </p>
  {% endif %}

  {% if post.excerpt %}
    <p>{{ post.excerpt }}</p>
  {% endif %}
</div>
